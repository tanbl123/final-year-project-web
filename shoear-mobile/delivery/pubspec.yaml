name: delivery
description: ShoeAR delivery personnel app — view assignments, update status, confirm with OTP, upload proof of delivery.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2               # talks to the PHP REST API
  provider: ^6.1.2           # simple state management (auth session)
  shared_preferences: ^2.3.2 # persists the JWT + basic user across launches
  image_picker: ^1.1.2       # take/pick the proof-of-delivery photo
  firebase_core: ^3.6.0      # Firebase initialisation (FCM push)
  firebase_messaging: ^15.1.3 # FCM background push notifications

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
